<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outreach CRM</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#252525;--text:#e0e0e0;--muted:#777;--accent:#f59e0b;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--purple:#a78bfa;--orange:#f97316;--cyan:#06b6d4}
body{font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

.header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:18px;font-weight:600;letter-spacing:-.5px}
.header h1 span{color:var(--accent)}

.stats{display:flex;gap:20px;padding:14px 24px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.stat{display:flex;flex-direction:column;gap:2px}
.stat-val{font-size:20px;font-weight:700}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

.tabs{display:flex;gap:0;padding:0 24px;border-bottom:1px solid var(--border);overflow-x:auto}
.tab{padding:10px 14px;font-size:12px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:.15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab .count{margin-left:5px;background:var(--border);padding:1px 5px;border-radius:8px;font-size:10px}

.toolbar{display:flex;justify-content:space-between;align-items:center;padding:12px 24px;gap:12px;flex-wrap:wrap}
.search-box{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 12px;color:var(--text);font-size:13px;width:240px}
.search-box:focus{outline:none;border-color:var(--accent)}
.btn{padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:500;transition:.15s}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover{opacity:.85}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--muted)}

.leads-wrap{padding:0 24px 24px}

.leads-header{display:grid;grid-template-columns:2fr 110px 80px 90px 100px 110px 70px;padding:8px 16px;gap:8px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:500;margin:0;border-bottom:1px solid var(--border)}

.lead-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden;transition:border-color .15s}
.lead-card:hover{border-color:#333}
.lead-card.expanded{border-color:#333}

.lead-row{display:grid;grid-template-columns:2fr 110px 80px 90px 100px 110px 70px;align-items:center;padding:12px 16px;cursor:pointer;gap:8px}
.lead-row:hover{background:var(--surface2)}

.lead-project{display:flex;flex-direction:column;gap:1px;min-width:0}
.lead-project .name{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lead-project .founder{font-size:11px;color:var(--muted)}

.col-label{display:none;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.col-val{font-size:12px}
.money{font-variant-numeric:tabular-nums;font-weight:600}

.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;text-transform:uppercase}
.stage-sent{background:#3b82f622;color:var(--blue)}
.stage-replied{background:#22c55e22;color:var(--green)}
.stage-deal{background:#22c55e44;color:var(--green)}
.stage-form_sent{background:#a78bfa22;color:var(--purple)}
.stage-form_filled{background:#a78bfa44;color:var(--purple)}
.stage-showcase{background:#f59e0b22;color:var(--accent)}
.stage-dead{background:#77777722;color:var(--muted)}

.lead-detail{display:none;border-top:1px solid var(--border);padding:16px;background:var(--bg)}
.lead-card.expanded .lead-detail{display:block}

.detail-grid{display:grid;grid-template-columns:280px 1fr;gap:16px;margin-bottom:16px}
.detail-section{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px}
.detail-section h3{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--accent);margin-bottom:8px;font-weight:600}

.kv{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.kv:last-child{border-bottom:none}
.kv-key{color:var(--muted)}
.kv-val{font-weight:500;text-align:right;max-width:60%;word-break:break-word}

.bool-yes{color:var(--green)}
.bool-no{color:var(--muted)}

.detail-full{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px}
.detail-full h3{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--accent);margin-bottom:8px;font-weight:600}
.detail-full p{font-size:12px;line-height:1.6}

.detail-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}

.toast{position:fixed;bottom:20px;right:20px;background:var(--green);color:#000;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:500;z-index:200;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}

.empty{text-align:center;padding:48px 24px;color:var(--muted)}

@media(max-width:900px){
  .lead-row{grid-template-columns:1fr 1fr;gap:10px}
  .col-label{display:block}
  .leads-header{display:none}
  .detail-grid{grid-template-columns:1fr}
  .header,.stats,.toolbar,.leads-wrap{padding-left:12px;padding-right:12px}
  .tabs{padding:0 12px}
  .search-box{width:100%}
}
</style>
</head>
<body>

<div class="header">
  <h1><span>●</span> Outreach CRM</h1>
  <button class="btn btn-ghost btn-sm" onclick="loadLeads()">↻ Refresh</button>
</div>

<div class="stats" id="stats"></div>
<div class="tabs" id="tabs"></div>

<div class="toolbar">
  <input class="search-box" id="search" placeholder="Search startup or founder..." oninput="render()">
  <span id="showing" style="font-size:12px;color:var(--muted)"></span>
</div>

<div class="leads-header">
  <span>Startup</span>
  <span>Stage</span>
  <span>MRR</span>
  <span>Price</span>
  <span>Category</span>
  <span>Contacted</span>
  <span>Account</span>
</div>

<div class="leads-wrap" id="leads-wrap">
  <div class="empty" id="empty" style="display:none"><p>No leads found</p></div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://jehtyfibjzjldogrrhoh.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImplaHR5ZmlianpqbGRvZ3JyaG9oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwMzU5NTAsImV4cCI6MjA5NzYxMTk1MH0.enshFvqwFCtJGlEoXHc3yLfkyAUaHxS0OGAVPqM6jGw';
const API = `${SUPABASE_URL}/rest/v1/outreach_leads`;
const headers = {
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};

let leads = [];
let activeTab = 'all';
let expandedId = null;

const STAGES = [
  {key:'all', label:'All'},
  {key:'Sent', label:'Sent'},
  {key:'Replied', label:'Replied'},
  {key:'Deal', label:'Deal'},
  {key:'Form Sent', label:'Form Sent'},
  {key:'Form Filled', label:'Form Filled'},
  {key:'Showcase', label:'Showcase'},
  {key:'Dead', label:'Dead'}
];

function fmt(n){ return n ? '$'+Number(n).toLocaleString('en-US') : '—' }
function fmtDate(d){ if(!d) return '—'; const dt=new Date(d); return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function esc(s){ if(!s) return ''; const d=document.createElement('div');d.textContent=s;return d.innerHTML; }
function stageClass(s){ return 'stage-'+(s||'sent').toLowerCase().replace(/\s+/g,'_'); }
function shortAccount(a){ return a ? a.split('@')[0].slice(0,6)+'...' : '—'; }
function boolIcon(v){ return v ? '<span class="bool-yes">Yes</span>' : '<span class="bool-no">No</span>'; }

async function loadLeads(){
  const r = await fetch(`${API}?select=*&order=date_contacted.desc.nullsfirst,created_at.desc`, {headers});
  if(!r.ok){ toast('Failed to load','var(--red)'); return; }
  leads = await r.json();
  render();
}

function filtered(){
  let f = activeTab === 'all' ? leads : leads.filter(l => l.funnel_stage === activeTab);
  const q = document.getElementById('search').value.toLowerCase().trim();
  if(q) f = f.filter(l => (l.startup_name||'').toLowerCase().includes(q) || (l.founder_name||'').toLowerCase().includes(q));
  return f;
}

function renderDetail(l){
  const kvPairs = [
    ['TrustMRR', l.trustmrr_link ? `<a href="${esc(l.trustmrr_link)}" target="_blank">Open</a>` : '—'],
    ['Founder', esc(l.founder_name) || '—'],
    ['Category', esc(l.category) || '—'],
    ['MRR', fmt(l.mrr)],
    ['Asking Price', fmt(l.asking_price)],
    ['Original Price', fmt(l.original_price)],
    ['Current Price', fmt(l.current_price)],
    ['Price Drops', l.price_drops || 0],
    ['Multiple', l.multiple ? l.multiple+'x' : '—'],
    ['Days on Market', l.days_on_market || '—'],
    ['Revenue Trend', esc(l.revenue_trend) || '—'],
    ['Account', esc(l.outreach_account) || '—'],
    ['Contacted', fmtDate(l.date_contacted)],
    ['Reply Time', l.reply_time_hrs ? l.reply_time_hrs+'h' : '—'],
    ['Sentiment', esc(l.first_reply_sentiment) || '—'],
    ['Template', esc(l.template_used) || '—'],
    ['Has Other Broker', esc(l.has_other_broker) || '—'],
  ];
  const kvHtml = kvPairs.map(([k,v]) => `<div class="kv"><span class="kv-key">${k}</span><span class="kv-val">${v}</span></div>`).join('');

  const boolPairs = [
    ['Form Sent', l.form_sent],
    ['Form Filled', l.form_filled],
    ['Listed on ExitBid', l.listed_on_exitbid],
    ['Listed on fl1p', l.listed_on_fl1p],
  ];
  const boolHtml = boolPairs.map(([k,v]) => `<div class="kv"><span class="kv-key">${k}</span><span class="kv-val">${boolIcon(v)}</span></div>`).join('');

  let rightHtml = '';
  if(l.key_quote) rightHtml += `<div class="detail-full"><h3>Key Quote</h3><p>"${esc(l.key_quote)}"</p></div>`;

  if(l.sell_reason) {
    const formKv = [
      ['Why Selling', l.sell_reason],
      ['Close Urgency', l.close_urgency],
      ['Price Confidence', l.price_confidence],
      ['Deal Priority', l.deal_priority],
      ['Weekly Hours', l.weekly_hours],
      ['Included', l.included_assets],
      ['Transfer Risk', l.transfer_risk],
      ['Listed On', l.listed_on],
      ['Offers Received', l.offer_status],
      ['Email', l.seller_email],
    ].filter(([,v]) => v);
    const formHtml = formKv.map(([k,v]) => `<div class="kv"><span class="kv-key">${k}</span><span class="kv-val">${esc(v)}</span></div>`).join('');
    rightHtml += `<div class="detail-section"><h3>Intake Form</h3>${formHtml}</div>`;
    if(l.seller_notes) rightHtml += `<div class="detail-full"><h3>Seller Notes</h3><p>${esc(l.seller_notes)}</p></div>`;
  }

  if(l.last_message) rightHtml += `<div class="detail-full"><h3>Last Message</h3><p>${esc(l.last_message)}</p></div>`;
  if(l.objections) rightHtml += `<div class="detail-full"><h3>Objections</h3><p>${esc(l.objections)}</p></div>`;
  if(l.competing_offers) rightHtml += `<div class="detail-full"><h3>Competing Offers</h3><p>${esc(l.competing_offers)}</p></div>`;
  if(l.next_action) rightHtml += `<div class="detail-full"><h3>Next Action</h3><p>${esc(l.next_action)}</p></div>`;
  if(l.notes) rightHtml += `<div class="detail-full"><h3>Notes</h3><p>${esc(l.notes)}</p></div>`;
  if(l.lost_reason) rightHtml += `<div class="detail-full"><h3>Lost Reason</h3><p>${esc(l.lost_reason)}</p></div>`;
  if(!rightHtml) rightHtml = '<div class="detail-full"><h3>No details yet</h3><p style="color:var(--muted)">Data will appear as conversations progress</p></div>';

  return `
    <div class="lead-detail">
      <div class="detail-grid">
        <div>
          <div class="detail-section" style="margin-bottom:12px"><h3>Lead Info</h3>${kvHtml}</div>
          <div class="detail-section"><h3>Pipeline</h3>${boolHtml}</div>
        </div>
        <div>${rightHtml}</div>
      </div>
      <div class="detail-actions">
        ${l.trustmrr_link ? `<a href="${esc(l.trustmrr_link)}" target="_blank" class="btn btn-ghost btn-sm" onclick="event.stopPropagation()">Open TrustMRR</a>` : ''}
      </div>
    </div>`;
}

function render(){
  const replied = leads.filter(l => ['Replied','Form Sent','Form Filled','Deal'].includes(l.funnel_stage));
  const hot = leads.filter(l => l.funnel_stage === 'Form Filled');
  const formSent = leads.filter(l => l.funnel_stage === 'Form Sent');
  const dead = leads.filter(l => ['Dead','Showcase'].includes(l.funnel_stage));
  const sent = leads.filter(l => l.funnel_stage === 'Sent');
  const replyRate = leads.length ? Math.round(replied.length / leads.length * 100) : 0;

  document.getElementById('stats').innerHTML = `
    <div class="stat"><span class="stat-val">${leads.length}</span><span class="stat-label">Total</span></div>
    <div class="stat"><span class="stat-val">${replied.length}</span><span class="stat-label">Replied</span></div>
    <div class="stat"><span class="stat-val" style="color:var(--green)">${replyRate}%</span><span class="stat-label">Reply Rate</span></div>
    <div class="stat"><span class="stat-val" style="color:var(--red)">${hot.length}</span><span class="stat-label">Hot (Form Filled)</span></div>
    <div class="stat"><span class="stat-val" style="color:var(--orange)">${formSent.length}</span><span class="stat-label">Form Sent</span></div>
    <div class="stat"><span class="stat-val">${sent.length}</span><span class="stat-label">No Reply</span></div>
  `;

  document.getElementById('tabs').innerHTML = STAGES.map(s => {
    const c = s.key === 'all' ? leads.length : leads.filter(l => l.funnel_stage === s.key).length;
    if(c === 0 && s.key !== 'all') return '';
    return `<div class="tab ${activeTab===s.key?'active':''}" onclick="setTab('${s.key}')">${s.label}<span class="count">${c}</span></div>`;
  }).join('');

  const rows = filtered();
  document.getElementById('showing').textContent = `${rows.length} lead${rows.length!==1?'s':''}`;
  document.getElementById('empty').style.display = rows.length ? 'none' : 'block';

  const wrap = document.getElementById('leads-wrap');
  const emptyEl = document.getElementById('empty');
  wrap.innerHTML = '';
  wrap.appendChild(emptyEl);

  rows.forEach(l => {
    const isExpanded = expandedId === l.id;
    const card = document.createElement('div');
    card.className = `lead-card${isExpanded ? ' expanded' : ''}`;
    card.innerHTML = `
      <div class="lead-row" onclick="toggleExpand('${l.id}')">
        <div class="lead-project">
          <div class="name">${esc(l.startup_name || 'Unknown')}</div>
          ${l.founder_name ? `<div class="founder">by ${esc(l.founder_name)}</div>` : ''}
        </div>
        <div>
          <div class="col-label">Stage</div>
          <span class="badge ${stageClass(l.funnel_stage)}">${esc(l.funnel_stage || 'New')}</span>
        </div>
        <div>
          <div class="col-label">MRR</div>
          <div class="col-val money">${fmt(l.mrr)}</div>
        </div>
        <div>
          <div class="col-label">Price</div>
          <div class="col-val money">${fmt(l.asking_price)}</div>
        </div>
        <div>
          <div class="col-label">Category</div>
          <div class="col-val" style="font-size:11px;color:var(--muted)">${esc(l.category || '—')}</div>
        </div>
        <div>
          <div class="col-label">Contacted</div>
          <div class="col-val" style="font-size:11px;color:var(--muted)">${fmtDate(l.date_contacted)}</div>
        </div>
        <div>
          <div class="col-label">Account</div>
          <div class="col-val" style="font-size:11px;color:var(--muted)">${shortAccount(l.outreach_account)}</div>
        </div>
      </div>
      ${renderDetail(l)}
    `;
    wrap.appendChild(card);
  });
}

function toggleExpand(id){ expandedId = expandedId === id ? null : id; render(); }
function setTab(t){ activeTab = t; render(); }
function toast(msg, bg){ const t=document.getElementById('toast'); t.textContent=msg; t.style.background=bg||'var(--green)'; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }

loadLeads();
</script>
</body>
</html>
